<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NexLib</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
}

.container {
  width: 90%;
  max-width: 1000px;
  margin: auto;
  margin-top: 30px;
}

h1 {
  text-align: center;
  color: #38bdf8;
}

.box {
  background: #020617;
  border-radius: 10px;
  padding: 15px;
  height: 400px;
  overflow-y: auto;
  color: #22c55e;
  font-family: monospace;
}

input {
  width: 70%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px;
  margin-left: 10px;
  background: #38bdf8;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

.status {
  margin-top: 10px;
  color: yellow;
}
</style>
</head>

<body>

<div class="container">
  <h1>Library Management System</h1>

  <div id="status" class="status">Loading...</div>

  <div id="output" class="box"></div>

  <div>
    <input id="inputBox" type="text" placeholder="Enter input here">
    <button onclick="sendInput()">Send</button>
  </div>
</div>

<script>
var output = document.getElementById("output");
var inputBox = document.getElementById("inputBox");
var statusBox = document.getElementById("status");

var inputQueue = [];

function sendInput() {
  var val = inputBox.value;
  inputQueue.push(val + "\n");
  inputBox.value = "";
}

var Module = {
  print: function(text) {
    output.innerHTML += text + "<br>";
    output.scrollTop = output.scrollHeight;
  },

  printErr: function(text) {
    output.innerHTML += text + "<br>";
  },

  setStatus: function(text) {
    statusBox.innerHTML = text;
  },

  stdin: function() {
    if (inputQueue.length === 0) return null;

    if (!Module.buffer || Module.buffer.length === 0) {
      Module.buffer = inputQueue.shift().split("").map(c => c.charCodeAt(0));
    }

    return Module.buffer.shift();
  },

  onRuntimeInitialized: function() {
    statusBox.innerHTML = "Program Loaded!";
  }
};
</script>

<script async src="index.js"></script>

</body>
</html>
